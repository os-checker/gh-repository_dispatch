name: Notiyfy deployment

on:
  workflow_dispatch:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - uses: taiki-e/install-action@v2
      with:
        tool: mdbook,mdbook-mermaid
    - run: mdbook build
    - name: Setup Pages
      uses: actions/configure-pages@v5
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        # Upload entire repository
        path: book
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
    - name: Notify Main Repo
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.ACCESS_TOKEN }} # 需要一个具有代码仓库写入权限的 Personal Access Token
        repository: os-checker/gh-repository_dispatch      # 代码仓库名
        event-type: docs_deployed       # 自定义事件名称
        client-payload: '{"version": "1"}' # 也可以传版本号过去
